<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#f5f7fb" />
<title>Ward Jobs</title>
<style>
:root{
  --bg:#f5f7fb;
  --panel:#ffffff;
  --line:#e7ebf3;
  --text:#18202f;
  --muted:#6d7890;
  --accent:#3f7cff;
  --accent-soft:#edf3ff;
  --green:#1f9d63;
  --green-soft:#eaf8f1;
  --red:#d84d4d;
  --red-soft:#fff0f0;
  --amber:#b7791f;
  --amber-soft:#fff7e8;
  --shadow:0 8px 24px rgba(23,33,61,.06);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif}
button,input,select,textarea{font:inherit}
button{cursor:pointer;border:none}
input,select,textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:13px 14px;background:#fff;color:var(--text);outline:none}
textarea{min-height:88px;resize:vertical}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(63,124,255,.08)}
.app{max-width:1180px;margin:0 auto;padding:18px 16px 110px}
.top{position:sticky;top:0;z-index:20;background:rgba(245,247,251,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.top-inner{max-width:1180px;margin:0 auto;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.brand{font-size:24px;font-weight:800;letter-spacing:-.03em}
.sub{font-size:13px;color:var(--muted)}
.notice{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px 16px;color:var(--muted);line-height:1.45;box-shadow:var(--shadow)}
.notice strong{color:var(--text)}
.layout{display:grid;grid-template-columns:330px 1fr;gap:18px;margin-top:18px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow)}
.card-head{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:10px}
.card-body{padding:16px 18px}
.stack{display:grid;gap:12px}
.row{display:flex;gap:10px;align-items:center}
.wrap{flex-wrap:wrap}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{padding:12px 14px;border-radius:14px;font-weight:700;background:#fff;border:1px solid var(--line);color:var(--text)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.soft{background:var(--accent-soft);color:var(--accent);border-color:transparent}
.btn.danger{background:var(--red-soft);color:var(--red);border-color:transparent}
.statbar{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
.stat{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px 16px;box-shadow:var(--shadow)}
.stat-num{font-size:28px;font-weight:800;letter-spacing:-.03em}
.stat-lbl{font-size:12px;color:var(--muted)}
.search{margin-bottom:10px}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.filter{padding:8px 12px;border-radius:999px;background:#fff;border:1px solid var(--line);font-size:12px;font-weight:700;color:var(--muted)}
.filter.active{background:var(--accent-soft);color:var(--accent);border-color:transparent}
.patient{padding:14px;border:1px solid var(--line);border-radius:18px;background:#fff;display:grid;gap:8px;cursor:pointer;transition:.15s}
.patient.active{border-color:rgba(63,124,255,.35);background:#fafdff;box-shadow:0 0 0 3px rgba(63,124,255,.06)}
.patient-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.patient-name{font-size:17px;font-weight:800;letter-spacing:-.02em}
.patient-meta{font-size:13px;color:var(--muted)}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:5px 9px;border-radius:999px;font-size:11px;font-weight:800}
.chip.blue{background:var(--accent-soft);color:var(--accent)}
.chip.green{background:var(--green-soft);color:var(--green)}
.chip.red{background:var(--red-soft);color:var(--red)}
.chip.amber{background:var(--amber-soft);color:var(--amber)}
.empty{padding:34px 16px;text-align:center;color:var(--muted)}
.hero{display:grid;gap:14px}
.hero-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.hero-name{font-size:28px;font-weight:900;letter-spacing:-.04em}
.hero-sub{font-size:14px;color:var(--muted)}
.section-title{font-size:15px;font-weight:800;margin-bottom:8px}
.summary-box{padding:16px;border:1px solid var(--line);border-radius:18px;background:#fbfcff}
.list{display:grid;gap:10px}
.job{display:flex;gap:12px;align-items:flex-start;padding:14px;border:1px solid var(--line);border-radius:18px;background:#fff}
.job.urgent{background:var(--red-soft);border-color:#ffd4d4}
.job.done{opacity:.55}
.tick{width:24px;height:24px;border-radius:8px;border:2px solid #c8d1e3;background:#fff;display:flex;align-items:center;justify-content:center;flex:0 0 auto;font-weight:900}
.tick.done{background:var(--green);border-color:var(--green);color:#fff}
.job-main{flex:1;min-width:0}
.job-text{font-weight:700;line-height:1.35}
.job-meta{font-size:12px;color:var(--muted);margin-top:4px}
.job-actions{display:flex;gap:8px;flex-wrap:wrap}
.linkish{background:none;padding:0;color:var(--muted);font-weight:700}
.linkish.red{color:var(--red)}
.quick-jobs{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}
.quick{padding:11px 12px;border-radius:14px;background:#fff;border:1px solid var(--line);text-align:left;font-weight:700;color:#2a3550}
.footerbar{position:fixed;left:0;right:0;bottom:0;background:rgba(245,247,251,.94);backdrop-filter:blur(10px);border-top:1px solid var(--line);z-index:22}
.footer-inner{max-width:1180px;margin:0 auto;padding:12px 16px;display:flex;gap:10px;flex-wrap:wrap}
.modal-wrap{position:fixed;inset:0;background:rgba(18,26,44,.28);display:none;align-items:flex-end;justify-content:center;padding:12px;z-index:30}
.modal-wrap.show{display:flex}
.modal{width:min(700px,100%);max-height:90vh;overflow:auto;background:#fff;border-radius:24px;border:1px solid var(--line);box-shadow:0 20px 60px rgba(20,28,50,.18);padding:20px}
.small{font-size:12px;color:var(--muted)}
@media (max-width:920px){
  .layout{grid-template-columns:1fr}
  .hero-name{font-size:24px}
  .statbar{grid-template-columns:1fr 1fr 1fr}
}
@media (max-width:640px){
  .top-inner{align-items:flex-start;flex-direction:column}
  .grid-2,.statbar{grid-template-columns:1fr}
  .hero-top{flex-direction:column}
}
</style>
</head>
<body>
<div class="top">
  <div class="top-inner">
    <div>
      <div class="brand">Ward Jobs</div>
      <div class="sub">Minimal tracker for Gen Med rounds</div>
    </div>
    <div class="sub" id="todayLabel"></div>
  </div>
</div>

<div class="app">
  <div class="notice"><strong>Keep it de-identified.</strong> Use initials, bed number, team labels. No full names, UR numbers, DOB, or anything your service would hate you storing.</div>

  <div class="statbar">
    <div class="stat"><div class="stat-num" id="mPatients">0</div><div class="stat-lbl">Patients</div></div>
    <div class="stat"><div class="stat-num" id="mPending">0</div><div class="stat-lbl">Jobs left</div></div>
    <div class="stat"><div class="stat-num" id="mUrgent">0</div><div class="stat-lbl">Urgent</div></div>
  </div>

  <div class="layout">
    <section class="card">
      <div class="card-head">
        <div>
          <div class="section-title" style="margin:0">Patients</div>
          <div class="small">Tap one to focus</div>
        </div>
        <button class="btn primary" onclick="openPatientModal()">Add</button>
      </div>
      <div class="card-body">
        <input class="search" id="searchBox" placeholder="Search by initials, bed, team" oninput="render()" />
        <div class="filter-row">
          <button class="filter active" id="filter-all" onclick="setFilter('all')">All</button>
          <button class="filter" id="filter-sick" onclick="setFilter('sick')">Sick / watch</button>
          <button class="filter" id="filter-jobs" onclick="setFilter('jobs')">Has jobs</button>
          <button class="filter" id="filter-discharge" onclick="setFilter('discharge')">Discharge</button>
        </div>
        <div class="stack" id="patientList"></div>
      </div>
    </section>

    <section class="card">
      <div class="card-head">
        <div>
          <div class="section-title" style="margin:0">Focus patient</div>
          <div class="small" id="detailSubtitle">Select a patient</div>
        </div>
        <div class="row wrap">
          <button class="btn soft" onclick="openExportModal()">Backup</button>
          <button class="btn" id="editPatientBtn" onclick="editActivePatient()" disabled>Edit</button>
        </div>
      </div>
      <div class="card-body" id="detailPane"></div>
    </section>
  </div>
</div>

<div class="footerbar">
  <div class="footer-inner">
    <button class="btn primary" onclick="openPatientModal()">+ Patient</button>
    <button class="btn" onclick="openQuickJobModal()">+ Job</button>
    <button class="btn danger" onclick="clearDoneJobs()">Clear done</button>
  </div>
</div>

<div class="modal-wrap" id="modalWrap" onclick="closeModal(event)"><div class="modal" id="modalBox"></div></div>

<script>
const STORAGE_KEY='ward_jobs_minimal_v2';
const QUICK_JOBS=['Chase bloods','Review obs','Update family','Call consult','Scan booked?','Discharge summary','Discharge script','Physio review','OT review','Repeat ECG'];
let state={patients:[],activeId:null,filter:'all'};

function uid(){return Math.random().toString(36).slice(2,10)}
function nowLabel(){return new Date().toLocaleString([], {weekday:'short', day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'})}
function save(){localStorage.setItem(STORAGE_KEY, JSON.stringify(state))}
function load(){try{const raw=localStorage.getItem(STORAGE_KEY);if(raw) state=JSON.parse(raw)}catch(e){} if(!Array.isArray(state.patients)) state.patients=[]}
function mkJob(text,urgent=false){return{id:uid(),text,urgent,done:false,created:nowLabel()}}
function getActive(){return state.patients.find(p=>p.id===state.activeId)||null}
function pending(p){return p.jobs.filter(j=>!j.done).length}
function urgentCount(p){return p.jobs.filter(j=>!j.done&&j.urgent).length}
function setFilter(v){state.filter=v;render()}
function esc(s){return String(s||'').replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function escAttr(s){return esc(s).replace(/'/g,'&#39;')}
function nl2br(s){return esc(s).replace(/\n/g,'<br>')}

function seed(){
 if(state.patients.length) return;
 const a={id:uid(),alias:'J.S.',bed:'12A',team:'Med A',status:'stable',dischargeLikely:true,problems:'CAP, AKI improving',plan:'IVAB, wean O2, bloods, mobilise',notes:'Possible discharge tomorrow.',jobs:[mkJob('Chase morning bloods'),mkJob('Call son with update',true)],reviewedToday:false};
 const b={id:uid(),alias:'M.K.',bed:'7C',team:'Med B',status:'watch',dischargeLikely:false,problems:'CCF, AF',plan:'Diurese, fluid balance, echo',notes:'Borderline BP overnight.',jobs:[mkJob('Echo booked?',true)],reviewedToday:false};
 state.patients=[a,b]; state.activeId=a.id; save();
}

function renderMetrics(){
 const jobs=state.patients.flatMap(p=>p.jobs);
 document.getElementById('mPatients').textContent=state.patients.length;
 document.getElementById('mPending').textContent=jobs.filter(j=>!j.done).length;
 document.getElementById('mUrgent').textContent=jobs.filter(j=>!j.done&&j.urgent).length;
}

function filteredPatients(){
 const q=(document.getElementById('searchBox')?.value||'').trim().toLowerCase();
 return state.patients.filter(p=>{
   const search=!q||[p.alias,p.bed,p.team,p.problems].join(' ').toLowerCase().includes(q);
   let f=true;
   if(state.filter==='sick') f=p.status==='sick'||p.status==='watch';
   if(state.filter==='jobs') f=pending(p)>0;
   if(state.filter==='discharge') f=!!p.dischargeLikely;
   return search&&f;
 })
}

function statusChip(status){
 if(status==='sick') return '<span class="chip red">Sick</span>';
 if(status==='watch') return '<span class="chip amber">Watch</span>';
 return '<span class="chip green">Stable</span>';
}

function renderPatientList(){
 ['all','sick','jobs','discharge'].forEach(f=>document.getElementById('filter-'+f)?.classList.toggle('active',state.filter===f));
 const wrap=document.getElementById('patientList');
 const pts=filteredPatients();
 if(!pts.length){wrap.innerHTML='<div class="empty">No patients match that filter.</div>';return}
 wrap.innerHTML=pts.map(p=>`<div class="patient ${p.id===state.activeId?'active':''}" onclick="selectPatient('${p.id}')">
   <div class="patient-top">
     <div>
       <div class="patient-name">${esc(p.alias||'Unnamed')}</div>
       <div class="patient-meta">Bed ${esc(p.bed||'-')} · ${esc(p.team||'-')}</div>
     </div>
     ${statusChip(p.status)}
   </div>
   <div class="chips">
     <span class="chip blue">${pending(p)} jobs</span>
     ${urgentCount(p)?`<span class="chip red">${urgentCount(p)} urgent</span>`:''}
     ${p.dischargeLikely?'<span class="chip green">Discharge</span>':''}
     ${p.reviewedToday?'<span class="chip amber">WR done</span>':''}
   </div>
   <div class="small">${esc((p.problems||'').slice(0,90)||'No summary yet')}</div>
 </div>`).join('');
}

function renderDetail(){
 const p=getActive();
 const pane=document.getElementById('detailPane');
 const edit=document.getElementById('editPatientBtn');
 edit.disabled=!p;
 document.getElementById('todayLabel').textContent=nowLabel();
 if(!p){
   document.getElementById('detailSubtitle').textContent='Select a patient';
   pane.innerHTML='<div class="empty">Pick a patient from the left.</div>';
   return;
 }
 document.getElementById('detailSubtitle').textContent=`Bed ${p.bed||'-'} · ${p.team||'-'}`;
 pane.innerHTML=`
   <div class="hero">
     <div class="hero-top">
       <div>
         <div class="hero-name">${esc(p.alias||'Unnamed')}</div>
         <div class="hero-sub">Bed ${esc(p.bed||'-')} · ${esc(p.team||'-')}</div>
       </div>
       <div class="chips">
         ${statusChip(p.status)}
         ${p.dischargeLikely?'<span class="chip green">Discharge likely</span>':''}
         <span class="chip blue">${pending(p)} jobs left</span>
       </div>
     </div>

     <div class="grid-2">
       <div class="summary-box">
         <div class="section-title">Problem list</div>
         <div>${(p.problems&&nl2br(p.problems))||'<span class="small">None added</span>'}</div>
       </div>
       <div class="summary-box">
         <div class="section-title">Plan today</div>
         <div>${(p.plan&&nl2br(p.plan))||'<span class="small">None added</span>'}</div>
       </div>
     </div>

     <div>
       <div class="row wrap" style="justify-content:space-between;margin-bottom:8px">
         <div class="section-title" style="margin:0">Jobs</div>
         <div class="row wrap">
           <button class="btn soft" onclick="toggleReviewed()">${p.reviewedToday?'Ward round done':'Mark WR done'}</button>
         </div>
       </div>
       <div class="quick-jobs" style="margin-bottom:10px">${QUICK_JOBS.map(q=>`<button class="quick" onclick="addQuickJob('${escAttr(q)}')">${esc(q)}</button>`).join('')}</div>
       <div class="row wrap" style="margin-bottom:10px">
         <input id="newJobText" placeholder="Type a new job" style="flex:1;min-width:220px">
         <label class="small" style="display:flex;align-items:center;gap:6px;padding:0 6px"><input type="checkbox" id="newJobUrgent" style="width:auto"> urgent</label>
         <button class="btn primary" onclick="addCustomJob()">Add job</button>
       </div>
       <div class="list">${renderJobs(p)}</div>
     </div>

     <div>
       <div class="section-title">Notes</div>
       <textarea onchange="updateField('notes',this.value)" placeholder="Overnight events, reminders, family updates">${esc(p.notes||'')}</textarea>
     </div>

     <div class="row wrap">
       <button class="btn" onclick="movePatient(-1)">Previous</button>
       <button class="btn" onclick="movePatient(1)">Next</button>
       <button class="btn danger" onclick="deleteActivePatient()">Delete patient</button>
     </div>
   </div>`;
}

function renderJobs(p){
 if(!p.jobs.length) return '<div class="empty">No jobs yet.</div>';
 const ordered=[...p.jobs].sort((a,b)=>Number(a.done)-Number(b.done)||Number(b.urgent)-Number(a.urgent));
 return ordered.map(j=>`<div class="job ${j.urgent&&!j.done?'urgent':''} ${j.done?'done':''}">
   <button class="tick ${j.done?'done':''}" onclick="toggleJob('${p.id}','${j.id}')">${j.done?'✓':''}</button>
   <div class="job-main">
     <div class="job-text">${esc(j.text)}</div>
     <div class="job-meta">${esc(j.created||'')} ${j.urgent?'· urgent':''}</div>
   </div>
   <div class="job-actions">
     ${!j.done?`<button class="linkish" onclick="toggleUrgent('${p.id}','${j.id}')">${j.urgent?'unflag':'urgent'}</button>`:''}
     <button class="linkish red" onclick="removeJob('${p.id}','${j.id}')">delete</button>
   </div>
 </div>`).join('');
}

function render(){renderMetrics();renderPatientList();renderDetail();save()}
function selectPatient(id){state.activeId=id;render()}
function toggleReviewed(){const p=getActive();if(!p)return;p.reviewedToday=!p.reviewedToday;render()}
function updateField(f,v){const p=getActive();if(!p)return;p[f]=v;save()}
function addQuickJob(text){const p=getActive();if(!p)return;p.jobs.unshift(mkJob(text,false));render()}
function addCustomJob(){const p=getActive();if(!p)return;const text=(document.getElementById('newJobText').value||'').trim();if(!text)return;const urgent=document.getElementById('newJobUrgent').checked;p.jobs.unshift(mkJob(text,urgent));document.getElementById('newJobText').value='';document.getElementById('newJobUrgent').checked=false;render()}
function toggleJob(pid,jid){const p=state.patients.find(x=>x.id===pid);if(!p)return;const j=p.jobs.find(x=>x.id===jid);if(!j)return;j.done=!j.done;render()}
function toggleUrgent(pid,jid){const p=state.patients.find(x=>x.id===pid);if(!p)return;const j=p.jobs.find(x=>x.id===jid);if(!j)return;j.urgent=!j.urgent;render()}
function removeJob(pid,jid){const p=state.patients.find(x=>x.id===pid);if(!p)return;p.jobs=p.jobs.filter(j=>j.id!==jid);render()}
function clearDoneJobs(){state.patients.forEach(p=>p.jobs=p.jobs.filter(j=>!j.done));render()}
function movePatient(dir){const i=state.patients.findIndex(p=>p.id===state.activeId);const n=i+dir;if(n>=0&&n<state.patients.length){state.activeId=state.patients[n].id;render()}}

function openPatientModal(editId=null){
 const p=editId?state.patients.find(x=>x.id===editId):null;
 modal(`<div class="stack">
   <div><div class="hero-name" style="font-size:24px">${p?'Edit patient':'Add patient'}</div><div class="small">Keep it de-identified.</div></div>
   <div class="grid-2">
     <div><div class="small">Initials / alias</div><input id="fAlias" value="${escAttr(p?.alias||'')}" placeholder="J.S."></div>
     <div><div class="small">Bed</div><input id="fBed" value="${escAttr(p?.bed||'')}" placeholder="12A"></div>
   </div>
   <div class="grid-2">
     <div><div class="small">Team</div><input id="fTeam" value="${escAttr(p?.team||'')}" placeholder="Med A"></div>
     <div><div class="small">Status</div><select id="fStatus"><option value="stable">Stable</option><option value="watch">Watch</option><option value="sick">Sick</option></select></div>
   </div>
   <label class="small" style="display:flex;align-items:center;gap:8px"><input type="checkbox" id="fDischarge" style="width:auto"> likely discharge</label>
   <div><div class="small">Problem list</div><textarea id="fProblems" placeholder="CAP, AKI, falls">${esc(p?.problems||'')}</textarea></div>
   <div><div class="small">Plan today</div><textarea id="fPlan" placeholder="Main treatment plan and jobs">${esc(p?.plan||'')}</textarea></div>
   <div><div class="small">Notes</div><textarea id="fNotes" placeholder="Short notes">${esc(p?.notes||'')}</textarea></div>
   <div class="row wrap"><button class="btn primary" onclick="savePatient('${p?.id||''}')">Save</button><button class="btn" onclick="hideModal()">Cancel</button></div>
 </div>`);
 document.getElementById('fStatus').value=p?.status||'stable';
 document.getElementById('fDischarge').checked=!!p?.dischargeLikely;
}

function savePatient(editId){
 const data={alias:val('fAlias'),bed:val('fBed'),team:val('fTeam'),status:val('fStatus'),dischargeLikely:document.getElementById('fDischarge').checked,problems:val('fProblems'),plan:val('fPlan'),notes:val('fNotes')};
 if(!data.alias.trim()) return alert('Add initials or alias');
 if(editId){Object.assign(state.patients.find(x=>x.id===editId),data)}
 else{const p={id:uid(),...data,jobs:[],reviewedToday:false};state.patients.unshift(p);state.activeId=p.id}
 hideModal();render();
}
function editActivePatient(){const p=getActive();if(p) openPatientModal(p.id)}
function deleteActivePatient(){const p=getActive();if(!p)return;if(!confirm('Delete this patient?'))return;state.patients=state.patients.filter(x=>x.id!==p.id);state.activeId=state.patients[0]?.id||null;render()}
function openQuickJobModal(){const p=getActive();if(!p){alert('Select a patient first');return;}modal(`<div class="stack"><div><div class="hero-name" style="font-size:24px">Add job</div><div class="small">For ${esc(p.alias)}</div></div><input id="qjText" placeholder="e.g. chase CT result"><label class="small" style="display:flex;align-items:center;gap:8px"><input type="checkbox" id="qjUrgent" style="width:auto"> urgent</label><div class="quick-jobs">${QUICK_JOBS.map(q=>`<button class="quick" onclick="document.getElementById('qjText').value='${escAttr(q)}'">${esc(q)}</button>`).join('')}</div><div class="row wrap"><button class="btn primary" onclick="submitQuickJob()">Add</button><button class="btn" onclick="hideModal()">Cancel</button></div></div>`)}
function submitQuickJob(){const p=getActive();if(!p)return;const text=val('qjText').trim();if(!text)return;p.jobs.unshift(mkJob(text,document.getElementById('qjUrgent').checked));hideModal();render()}

function openExportModal(){modal(`<div class="stack"><div><div class="hero-name" style="font-size:24px">Backup</div><div class="small">Export or restore local data</div></div><div class="row wrap"><button class="btn primary" onclick="exportData()">Export JSON</button><label class="btn">Import JSON<input type="file" accept="application/json" style="display:none" onchange="importData(event)"></label><button class="btn danger" onclick="wipeAllData()">Wipe all</button></div></div>`)}
function exportData(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`ward-jobs-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(a.href)}
function importData(event){const file=event.target.files?.[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{try{const data=JSON.parse(reader.result);if(!Array.isArray(data.patients))throw new Error('bad');state=data;hideModal();render()}catch(e){alert('Invalid backup file')}};reader.readAsText(file)}
function wipeAllData(){if(!confirm('Delete all local data?'))return;state={patients:[],activeId:null,filter:'all'};hideModal();render()}

function modal(html){document.getElementById('modalBox').innerHTML=html;document.getElementById('modalWrap').classList.add('show')}
function hideModal(){document.getElementById('modalWrap').classList.remove('show')}
function closeModal(e){if(e.target.id==='modalWrap') hideModal()}
function val(id){return document.getElementById(id)?.value||''}

load();seed();render();
</script>
</body>
</html>
