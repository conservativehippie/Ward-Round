<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0c0e14">
<title>Ward Round Companion</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0e14; --surface: #14171f; --card: #1a1e28; --cardH: #1f2433;
  --border: #262c3a; --borderL: #2e3548;
  --text: #e4e6ec; --dim: #7c8298; --faint: #4e5468;
  --accent: #5ba4f5; --accentD: rgba(91,164,245,0.09);
  --urgent: #f06565; --urgentD: rgba(240,101,101,0.08);
  --green: #4ade80; --greenD: rgba(74,222,128,0.08);
  --amber: #fbbf24; --amberD: rgba(251,191,36,0.08);
  --purple: #a78bfa;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5;
  -webkit-font-smoothing: antialiased; overflow-x: hidden;
}
input, textarea, select, button { font-family: inherit; }
input, textarea, select {
  background: var(--card); border: 1px solid var(--border); border-radius: 8px;
  padding: 9px 12px; color: var(--text); font-size: 14px; width: 100%;
  outline: none;
}
textarea { min-height: 64px; resize: vertical; }
select { appearance: none; cursor: pointer; }
input:focus, textarea:focus, select:focus { border-color: var(--accent); }
button { cursor: pointer; border: none; background: none; color: var(--text); }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--dim); margin-bottom: 4px; display: block; }
.field { margin-bottom: 12px; }

.btn {
  padding: 10px 16px; border-radius: 8px; font-weight: 600; font-size: 13px;
  display: inline-flex; align-items: center; gap: 6px; letter-spacing: -0.01em;
}
.btn-accent { background: var(--accent); color: #000; }
.btn-danger { background: var(--urgent); color: #000; }
.btn-default { background: var(--card); color: var(--text); }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-ghost { background: none; }

.pill {
  padding: 6px 14px; border-radius: 99px; font-size: 12px; font-weight: 600;
  white-space: nowrap; letter-spacing: -0.01em; flex-shrink: 0;
  border: 1px solid var(--border); background: transparent; color: var(--dim);
  cursor: pointer; transition: all 0.15s;
}
.pill.active { border-color: var(--accent); background: var(--accentD); color: var(--accent); }

.tag { display: inline-block; padding: 2px 7px; border-radius: 6px; font-size: 11px; font-weight: 700; }

/* Layout */
#app { max-width: 520px; margin: 0 auto; padding-bottom: 72px; }
@media (min-width: 768px) {
  #app { max-width: 1100px; }
  #app.split { display: grid; grid-template-columns: 360px 1fr; min-height: calc(100vh - 50px); }
  #app.split .sidebar { border-right: 1px solid var(--border); overflow-y: auto; max-height: calc(100vh - 50px); }
  #app.split .main { overflow-y: auto; max-height: calc(100vh - 50px); }
}

/* Header */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(12,14,20,0.93); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
  max-width: inherit; margin: 0 auto;
}
.header-title { font-size: 17px; font-weight: 700; letter-spacing: -0.02em; display: flex; align-items: center; gap: 8px; }

/* Bottom nav */
.nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: rgba(20,23,31,0.96); backdrop-filter: blur(16px);
  border-top: 1px solid var(--border); display: flex; justify-content: center;
  max-width: 520px; margin: 0 auto;
}
@media (min-width: 768px) { .nav { max-width: 1100px; } }
.nav-btn {
  flex: 1; padding: 10px 0 8px; display: flex; flex-direction: column;
  align-items: center; gap: 3px; font-size: 10px; font-weight: 600;
  letter-spacing: 0.04em; text-transform: uppercase; color: var(--dim);
  position: relative; transition: color 0.15s;
}
.nav-btn.active { color: var(--accent); }
.nav-btn .badge {
  position: absolute; top: 4px; right: calc(50% - 18px);
  background: var(--urgent); color: #fff; font-size: 9px; font-weight: 800;
  border-radius: 99px; padding: 1px 5px; min-width: 14px; text-align: center;
}

/* Patient card */
.pat-card {
  background: var(--card); border-radius: 12px; padding: 14px 16px;
  margin-bottom: 8px; cursor: pointer; border: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px; transition: border-color 0.15s;
}
.pat-card.selected { border-color: rgba(91,164,245,0.35); background: var(--cardH); }
.pat-card:active { transform: scale(0.99); }

.bed-badge {
  width: 44px; height: 44px; border-radius: 10px; display: flex;
  align-items: center; justify-content: center; font-size: 13px;
  font-weight: 800; flex-shrink: 0;
}
.pat-info { flex: 1; min-width: 0; }
.pat-name { font-weight: 700; font-size: 15px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pat-sub { font-size: 12px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Task row */
.task-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: 8px; margin-bottom: 5px;
  background: var(--card); border: 1px solid var(--border);
}
.task-row.urgent { background: var(--urgentD); border-color: rgba(240,101,101,0.2); }
.task-check {
  width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0;
  border: 2px solid var(--dim); background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.task-check.done { border-color: var(--green); background: var(--green); }
.task-input {
  border: none !important; background: transparent !important; padding: 0 !important; flex: 1; min-width: 0;
}
.task-input.done-text { text-decoration: line-through; opacity: 0.5; }

/* Modals */
.modal-bg {
  position: fixed; inset: 0; z-index: 999;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
  display: flex; align-items: flex-end; justify-content: center;
}
@media (min-width: 768px) { .modal-bg { align-items: center; } }
.modal {
  background: var(--surface); border-radius: 16px 16px 0 0;
  width: 100%; max-width: 520px; max-height: 88vh; overflow-y: auto;
  padding: 20px 16px 32px;
}
@media (min-width: 768px) { .modal { border-radius: 16px; max-height: 80vh; } }

/* Score option button */
.score-opt {
  padding: 7px 12px; border-radius: 8px; font-size: 12px; font-weight: 600;
  border: 1.5px solid var(--border); cursor: pointer;
  background: transparent; color: var(--dim); transition: all 0.12s;
}
.score-opt.sel { border-color: var(--accent); background: var(--accentD); color: var(--accent); }

/* Quick add items */
.qa-item {
  padding: 6px 11px; border-radius: 7px; font-size: 12px; font-weight: 500;
  border: 1px solid var(--border); background: var(--card); color: var(--text);
  cursor: pointer; transition: background 0.12s;
}
.qa-item:active { background: var(--cardH); }

/* Sections */
.section { padding: 0 16px; }
.surface-box { background: var(--surface); border-radius: 10px; padding: 14px; margin-bottom: 14px; border: 1px solid var(--border); }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.flex-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
.pill-scroll { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; -webkit-overflow-scrolling: touch; }
.pill-scroll::-webkit-scrollbar { display: none; }

.ref-row {
  display: flex; justify-content: space-between; padding: 8px 14px; font-size: 13px;
  border-bottom: 1px solid var(--border);
}
.ref-row:last-child { border-bottom: none; }

/* Animations */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeIn 0.2s ease; }

/* Alert banner */
.alert-banner {
  margin: 0 16px 8px; padding: 8px 12px; background: var(--urgentD);
  border: 1px solid rgba(240,101,101,0.2); border-radius: 8px;
  font-size: 13px; color: var(--urgent); font-weight: 600;
  display: flex; gap: 8px; align-items: flex-start;
}

/* Safety check */
.safety-check {
  display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; color: var(--dim);
}
.safety-check.checked { color: var(--green); }
.safety-check input { accent-color: var(--green); }

/* Empty state */
.empty { text-align: center; padding: 60px 20px; color: var(--dim); }
.empty-icon { font-size: 44px; margin-bottom: 12px; }

/* Fluid card */
.fluid-card { background: var(--card); border-radius: 10px; padding: 12px 14px; border: 1px solid var(--border); margin-bottom: 8px; }

/* Score card grid */
.score-grid { display: grid; gap: 8px; }
@media (min-width: 768px) { .score-grid { grid-template-columns: 1fr 1fr; } }
.score-card {
  background: var(--card); border-radius: 10px; padding: 14px 16px;
  border: 1px solid var(--border); cursor: pointer; transition: border-color 0.15s;
}
.score-card:hover { border-color: var(--borderL); }

.hidden { display: none !important; }
</style>
</head>
<body>

<div class="header" id="header">
  <div class="header-title" id="headerTitle"><span style="color:var(--accent)">⚕</span> Ward Round</div>
  <div style="font-size:12px;color:var(--dim)" id="headerDate"></div>
</div>

<div id="app"></div>

<div class="nav" id="nav">
  <button class="nav-btn active" data-view="list" onclick="go('list')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Patients
  </button>
  <button class="nav-btn" data-view="tasks" onclick="go('tasks')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/></svg>
    All Jobs
    <span class="badge hidden" id="urgBadge"></span>
  </button>
  <button class="nav-btn" data-view="scores" onclick="go('scores')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="8.01" y2="10"/><line x1="12" y1="10" x2="12.01" y2="10"/><line x1="16" y1="10" x2="16.01" y2="10"/><line x1="8" y1="14" x2="8.01" y2="14"/><line x1="12" y1="14" x2="12.01" y2="14"/><line x1="16" y1="14" x2="16.01" y2="14"/></svg>
    Scores
  </button>
  <button class="nav-btn" data-view="reference" onclick="go('reference')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M4 4.5A2.5 2.5 0 016.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15z"/></svg>
    Ref
  </button>
</div>

<!-- Modals -->
<div class="modal-bg hidden" id="scoreModal" onclick="closeScore()">
  <div class="modal" id="scoreContent" onclick="event.stopPropagation()"></div>
</div>
<div class="modal-bg hidden" id="catModal" onclick="closeCat()">
  <div class="modal" id="catContent" onclick="event.stopPropagation()"></div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const CODE_COLORS = { full: '#22c55e', NFR: '#f59e0b', comfort: '#ef4444' };

const TASK_CATS = [
  { id:'bloods', label:'Bloods', icon:'🩸', color:'#ef4444', items:['FBC / UEC / CMP / LFT','Coags / Group & Hold','Blood cultures x2','Troponin','CRP / ESR','Lactate','BNP / NT-proBNP','TSH / fT4','Iron studies / B12 / folate','HbA1c','Lipid panel','Mg / PO₄ / Ca','Drug levels (digoxin / vanc / gent)','Cortisol (9am)','ABG / VBG'] },
  { id:'imaging', label:'Imaging', icon:'📷', color:'#8b5cf6', items:['CXR','AXR','CT head','CT chest','CT abdo/pelvis','CTPA','CT angiogram','USS abdomen','USS DVT','Echocardiogram','MRI brain'] },
  { id:'procedures', label:'Procedures', icon:'💉', color:'#06b6d4', items:['ECG','IDC insert','IDC remove','Cannula insert','Cannula resite','Nasogastric tube','ABG','Lumbar puncture','Paracentesis','Chest drain','Central line','Art line'] },
  { id:'meds', label:'Medications', icon:'💊', color:'#f59e0b', items:['Medication chart review','IV fluids order','VTE prophylaxis','Insulin sliding scale','Antibiotic review / step-down','Analgesia review','Anticoagulation (start/adjust/cease)','Steroid taper','Laxative / bowel regimen','Electrolyte replacement','Stat dose –','Withhold –','Cease –','Prescribe –'] },
  { id:'referrals', label:'Referrals', icon:'📞', color:'#22c55e', items:['Cardiology','Respiratory','Gastroenterology','Neurology','Renal','Infectious diseases','Endocrinology','Haematology','Oncology','Geriatrics','Palliative care','Surgical (gen)','Orthopaedics','ICU / MET review','Psychiatry / CL'] },
  { id:'allied', label:'Allied Health', icon:'🤝', color:'#ec4899', items:['Physiotherapy','Occupational therapy','Speech pathology','Dietitian','Social work','Pharmacist review','Discharge planner','Pastoral care','Drug & alcohol','Interpreter'] },
  { id:'admin', label:'Admin / Discharge', icon:'📋', color:'#64748b', items:['Discharge summary','Discharge script','Outpatient follow-up','GP letter','Family meeting','Goals of care discussion','ACD / advance care plan','Certify death','Coroner notification','Chase result –','Call –','Document –'] },
];

const SCORES = [
  { id:'news2', name:'NEWS2', sub:'National Early Warning Score', desc:'Detects acute deterioration',
    fields:[
      {k:'rr',l:'Resp Rate',o:[{l:'≤8',v:3},{l:'9–11',v:1},{l:'12–20',v:0},{l:'21–24',v:2},{l:'≥25',v:3}]},
      {k:'spo2',l:'SpO₂ (Scale 1)',o:[{l:'≤91%',v:3},{l:'92–93%',v:2},{l:'94–95%',v:1},{l:'≥96%',v:0}]},
      {k:'air',l:'Air / O₂',o:[{l:'Room air',v:0},{l:'Supplemental O₂',v:2}]},
      {k:'sbp',l:'Systolic BP',o:[{l:'≤90',v:3},{l:'91–100',v:2},{l:'101–110',v:1},{l:'111–219',v:0},{l:'≥220',v:3}]},
      {k:'hr',l:'Heart Rate',o:[{l:'≤40',v:3},{l:'41–50',v:1},{l:'51–90',v:0},{l:'91–110',v:1},{l:'111–130',v:2},{l:'≥131',v:3}]},
      {k:'temp',l:'Temperature',o:[{l:'≤35.0°C',v:3},{l:'35.1–36.0',v:1},{l:'36.1–38.0',v:0},{l:'38.1–39.0',v:1},{l:'≥39.1',v:2}]},
      {k:'avpu',l:'Consciousness',o:[{l:'Alert',v:0},{l:'Confusion (new)',v:3},{l:'Voice',v:3},{l:'Pain',v:3},{l:'Unresponsive',v:3}]},
    ],
    interp:s=>s>=7?{t:`${s} — HIGH (urgent/emergency)`,c:'#ef4444'}:s>=5?{t:`${s} — MEDIUM (urgent response)`,c:'#f59e0b'}:s>=1?{t:`${s} — LOW`,c:'#22c55e'}:{t:`${s} — No risk`,c:'#22c55e'}
  },
  { id:'curb65', name:'CURB-65', sub:'Pneumonia Severity', desc:'CAP severity & disposition',
    fields:[
      {k:'c',l:'Confusion (new)',o:[{l:'No',v:0},{l:'Yes',v:1}]},
      {k:'u',l:'Urea > 7 mmol/L',o:[{l:'No',v:0},{l:'Yes',v:1}]},
      {k:'r',l:'Resp rate ≥ 30',o:[{l:'No',v:0},{l:'Yes',v:1}]},
      {k:'b',l:'BP: SBP<90 or DBP≤60',o:[{l:'No',v:0},{l:'Yes',v:1}]},
      {k:'a',l:'Age ≥ 65',o:[{l:'No',v:0},{l:'Yes',v:1}]},
    ],
    interp:s=>s>=3?{t:`${s} — Severe. Consider ICU.`,c:'#ef4444'}:s===2?{t:`${s} — Moderate. Inpatient.`,c:'#f59e0b'}:{t:`${s} — Mild. Consider outpatient.`,c:'#22c55e'}
  },
  { id:'cha2ds2', name:'CHA₂DS₂-VASc', sub:'AF Stroke Risk', desc:'Stroke risk in non-valvular AF',
    fields:[
      {k:'chf',l:'Heart failure / LVEF ≤40%',o:[{l:'No',v:0},{l:'Yes',v:1}]},
      {k:'htn',l:'Hypertension',o:[{l:'No',v:0},{l:'Yes',v:1}]},
      {k:'age2',l:'Age ≥ 75',o:[{l:'No',v:0},{l:'Yes',v:2}]},
      {k:'dm',l:'Diabetes',o:[{l:'No',v:0},{l:'Yes',v:1}]},
      {k:'str',l:'Prior stroke / TIA / VTE',o:[{l:'No',v:0},{l:'Yes',v:2}]},
      {k:'vas',l:'Vascular disease',o:[{l:'No',v:0},{l:'Yes',v:1}]},
      {k:'age1',l:'Age 65–74',o:[{l:'No',v:0},{l:'Yes',v:1}]},
      {k:'sex',l:'Female sex',o:[{l:'No',v:0},{l:'Yes',v:1}]},
    ],
    interp:s=>s>=2?{t:`${s} — Anticoagulation recommended`,c:'#ef4444'}:s===1?{t:`${s} — Consider anticoagulation`,c:'#f59e0b'}:{t:`${s} — Low risk`,c:'#22c55e'}
  },
  { id:'wellsdvt', name:'Wells DVT', sub:'DVT Probability', desc:'Pre-test probability for DVT',
    fields:[
      {k:'cancer',l:'Active cancer',o:[{l:'No',v:0},{l:'Yes',v:1}]},
      {k:'para',l:'Paralysis / immobilisation of leg',o:[{l:'No',v:0},{l:'Yes',v:1}]},
      {k:'bed',l:'Bedrest >3d or surgery <12wk',o:[{l:'No',v:0},{l:'Yes',v:1}]},
      {k:'tend',l:'Tenderness along deep veins',o:[{l:'No',v:0},{l:'Yes',v:1}]},
      {k:'swell',l:'Entire leg swollen',o:[{l:'No',v:0},{l:'Yes',v:1}]},
      {k:'calf',l:'Calf >3cm larger',o:[{l:'No',v:0},{l:'Yes',v:1}]},
      {k:'pit',l:'Pitting oedema (affected)',o:[{l:'No',v:0},{l:'Yes',v:1}]},
      {k:'coll',l:'Collateral superficial veins',o:[{l:'No',v:0},{l:'Yes',v:1}]},
      {k:'prev',l:'Previous DVT',o:[{l:'No',v:0},{l:'Yes',v:1}]},
      {k:'alt',l:'Alternative dx equally likely',o:[{l:'No',v:0},{l:'Yes',v:-2}]},
    ],
    interp:s=>s>=3?{t:`${s} — High (~75%). Image.`,c:'#ef4444'}:s>=1?{t:`${s} — Moderate (~17%). D-dimer → image.`,c:'#f59e0b'}:{t:`${s} — Low (~5%). D-dimer to rule out.`,c:'#22c55e'}
  },
  { id:'wellspe', name:'Wells PE', sub:'PE Probability', desc:'Pre-test probability for PE',
    fields:[
      {k:'dvt',l:'Clinical signs of DVT',o:[{l:'No',v:0},{l:'Yes',v:3}]},
      {k:'alt',l:'PE most likely diagnosis',o:[{l:'No',v:0},{l:'Yes',v:3}]},
      {k:'hr',l:'Heart rate > 100',o:[{l:'No',v:0},{l:'Yes',v:1.5}]},
      {k:'imm',l:'Immobilisation ≥3d / surgery <4wk',o:[{l:'No',v:0},{l:'Yes',v:1.5}]},
      {k:'prev',l:'Previous PE or DVT',o:[{l:'No',v:0},{l:'Yes',v:1.5}]},
      {k:'haem',l:'Haemoptysis',o:[{l:'No',v:0},{l:'Yes',v:1}]},
      {k:'canc',l:'Active malignancy',o:[{l:'No',v:0},{l:'Yes',v:1}]},
    ],
    interp:s=>s>6?{t:`${s} — High. Consider CTPA.`,c:'#ef4444'}:s>=2?{t:`${s} — Moderate. D-dimer → CTPA.`,c:'#f59e0b'}:{t:`${s} — Low. D-dimer to rule out.`,c:'#22c55e'}
  },
  { id:'gbs', name:'Glasgow-Blatchford', sub:'Upper GI Bleed', desc:'Need for intervention in UGIB',
    fields:[
      {k:'bun',l:'Urea (mmol/L)',o:[{l:'<6.5',v:0},{l:'6.5–7.9',v:2},{l:'8–9.9',v:3},{l:'10–25',v:4},{l:'>25',v:6}]},
      {k:'hbm',l:'Hb – male (g/L)',o:[{l:'≥130',v:0},{l:'120–129',v:1},{l:'100–119',v:3},{l:'<100',v:6}]},
      {k:'hbf',l:'Hb – female (g/L)',o:[{l:'≥120',v:0},{l:'100–119',v:1},{l:'<100',v:6}]},
      {k:'sbp',l:'Systolic BP',o:[{l:'≥110',v:0},{l:'100–109',v:1},{l:'90–99',v:2},{l:'<90',v:3}]},
      {k:'hr',l:'HR ≥ 100',o:[{l:'No',v:0},{l:'Yes',v:1}]},
      {k:'mel',l:'Melaena',o:[{l:'No',v:0},{l:'Yes',v:1}]},
      {k:'syn',l:'Syncope',o:[{l:'No',v:0},{l:'Yes',v:2}]},
      {k:'liv',l:'Liver disease',o:[{l:'No',v:0},{l:'Yes',v:2}]},
      {k:'hf',l:'Heart failure',o:[{l:'No',v:0},{l:'Yes',v:2}]},
    ],

// ── STATE ──────────────────────────────────────────────────────────────────────
let patients = [];
let activeId = null;
let view = 'list';
let subTab = 'isbar';
let taskFilter = 'all';
let refTab = 'bloods';
let scoreState = {};
let catPickerId = null;

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const todayStr = () => new Date().toISOString().slice(0,10);
const timeStr = () => new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
const isWide = () => window.innerWidth >= 768;
const daysIn = d => { const diff = Math.floor((new Date(todayStr()) - new Date(d))/86400000); return diff<0?0:diff; };

function newPatient() {
  return { id:uid(), bed:'', name:'', age:'', diagnosis:'', dayOfAdmission:todayStr(),
    situation:'', background:'', assessment:'', recommendation:'', plan:'',
    tasks:[], notes:'', alerts:'', code:'full', ivAccess:'', diet:'',
    vte:false, idc:false, falls:false };
}

function loadData() {
  try { const d = JSON.parse(localStorage.getItem(STORAGE_KEY)); if(d?.patients){patients=d.patients;activeId=d.activeId||null;} } catch{}
}
function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({patients,activeId})); } catch{}
}
const STORAGE_KEY = 'ward-round-v2';

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function go(v) {
  view = v; render();
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.view === v || (b.dataset.view === 'list' && v === 'patient')));
}

function openPatient(id) {
  activeId = id; subTab = 'isbar'; view = 'patient'; saveData(); render();
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.view === 'list'));
}

// ── RENDER ─────────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  const wide = isWide();
  const showSplit = wide && (view === 'list' || view === 'patient');

  // Header
  const ht = document.getElementById('headerTitle');
  if (view === 'patient' && !wide) {
    ht.innerHTML = `<button class="btn btn-ghost btn-sm" onclick="go('list')" style="padding:0"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg> List</button>`;
  } else {
    ht.innerHTML = '<span style="color:var(--accent)">⚕</span> Ward Round';
  }

  // Date
  document.getElementById('headerDate').textContent = new Date().toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'});

  // Urgent badge
  const urg = patients.flatMap(p=>p.tasks).filter(t=>!t.done&&t.urgent).length;
  const badge = document.getElementById('urgBadge');
  badge.textContent = urg; badge.classList.toggle('hidden', urg===0);

  if (showSplit) {
    app.className = 'split';
    app.innerHTML = `<div class="sidebar">${renderPatientList()}</div><div class="main">${renderPatientDetail()}</div>`;
  } else {
    app.className = '';
    if (view === 'list') app.innerHTML = renderPatientList();
    else if (view === 'patient') app.innerHTML = renderPatientDetail();
    else if (view === 'tasks') app.innerHTML = renderAllTasks();
    else if (view === 'scores') app.innerHTML = renderScores();
    else if (view === 'reference') app.innerHTML = renderReference();
  }
  saveData();
}

// ── PATIENT LIST ──
function renderPatientList() {
  let h = `<div class="section"><div style="display:flex;justify-content:space-between;align-items:center;margin:16px 0 12px">
    <div style="font-size:13px;color:var(--dim)">${patients.length} patient${patients.length!==1?'s':''}</div>
    <button class="btn btn-accent" onclick="addPatient()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg> Add Patient</button>
  </div>`;
  if (!patients.length) {
    h += `<div class="empty"><div class="empty-icon">🏥</div><div style="font-weight:600;margin-bottom:4px">No patients yet</div><div style="font-size:13px">Tap "Add Patient" to start your round</div></div>`;
  }
  patients.forEach(p => {
    const pend = p.tasks.filter(t=>!t.done).length;
    const u = p.tasks.filter(t=>!t.done&&t.urgent).length;
    const sel = isWide() && p.id === activeId && view === 'patient';
    const cc = CODE_COLORS[p.code];
    h += `<div class="pat-card${sel?' selected':''}" onclick="openPatient('${p.id}')">
      <div class="bed-badge" style="background:${cc}14;border:2px solid ${cc}44;color:${cc}">${esc(p.bed||'?')}</div>
      <div class="pat-info"><div class="pat-name">${esc(p.name||'New Patient')}</div>
      <div class="pat-sub">${esc(p.diagnosis||'No diagnosis')} · Day ${daysIn(p.dayOfAdmission)}</div></div>
      <div style="display:flex;gap:5px;flex-shrink:0">
        ${u?`<span class="tag" style="background:var(--urgentD);color:var(--urgent)">${u}!</span>`:''}
        ${pend?`<span class="tag" style="background:var(--accentD);color:var(--accent)">${pend}</span>`:''}
      </div></div>`;
  });
  return h + '</div>';
}

// ── PATIENT DETAIL ──
function renderPatientDetail() {
  const p = patients.find(x=>x.id===activeId);
  if (!p) return '<div style="padding:40px;text-align:center;color:var(--dim)">Select a patient</div>';
  const idx = patients.indexOf(p);
  const cc = CODE_COLORS[p.code];

  let h = `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 16px">
    <button class="btn btn-ghost btn-sm" onclick="navPat(-1)" ${idx<=0?'disabled style="opacity:0.3"':''}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg></button>
    <div style="text-align:center"><div style="font-weight:700;font-size:16px">${esc(p.name||'New Patient')}</div>
    <div style="font-size:12px;color:var(--dim)">Bed ${esc(p.bed||'?')} · Day ${daysIn(p.dayOfAdmission)} · <span style="color:${cc}">${p.code.toUpperCase()}</span></div></div>
    <button class="btn btn-ghost btn-sm" onclick="navPat(1)" ${idx>=patients.length-1?'disabled style="opacity:0.3"':''}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg></button>
  </div>`;

  if (p.alerts) h += `<div class="alert-banner"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--urgent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>${esc(p.alerts)}</div>`;

  h += `<div style="display:flex;gap:6px;padding:0 16px;flex-wrap:wrap;margin-bottom:12px">
    <button class="pill${subTab==='isbar'?' active':''}" onclick="setSubTab('isbar')">ISBAR</button>
    <button class="pill${subTab==='tasks'?' active':''}" onclick="setSubTab('tasks')">Jobs (${p.tasks.filter(t=>!t.done).length})</button>
    <button class="pill${subTab==='notes'?' active':''}" onclick="setSubTab('notes')">Notes</button>
  </div><div class="section" style="padding-bottom:24px">`;

  if (subTab === 'isbar') h += renderISBAR(p);
  else if (subTab === 'tasks') h += renderTasks(p);
  else h += renderNotes(p);

  return h + '</div>';
}

function renderISBAR(p) {
  const cc = CODE_COLORS[p.code];
  return `
  <div class="grid-3">
    <div><label class="lbl">Bed</label><input value="${esc(p.bed)}" onchange="upField('${p.id}','bed',this.value)" placeholder="12"></div>
    <div><label class="lbl">Age</label><input value="${esc(p.age)}" onchange="upField('${p.id}','age',this.value)" placeholder="72"></div>
    <div><label class="lbl">Code</label><select style="color:${cc}" onchange="upField('${p.id}','code',this.value)">
      <option value="full"${p.code==='full'?' selected':''}>Full Code</option>
      <option value="NFR"${p.code==='NFR'?' selected':''}>NFR</option>
      <option value="comfort"${p.code==='comfort'?' selected':''}>Comfort</option>
    </select></div>
  </div>
  ${fld(p,'name','Name')}
  ${fld(p,'alerts','Alerts (allergies / isolation / key info)')}
  ${fld(p,'diagnosis','Diagnosis / Presenting complaint')}
  <div class="field"><label class="lbl">Admission date</label><input type="date" value="${p.dayOfAdmission}" onchange="upField('${p.id}','dayOfAdmission',this.value)"></div>
  <div class="surface-box">
    <div style="font-size:10px;font-weight:800;color:var(--accent);letter-spacing:0.1em;margin-bottom:10px;text-transform:uppercase">ISBAR Handover</div>
    ${fld(p,'situation','I – Identify',1)}
    ${fld(p,'background','S – Situation (why admitted)',1)}
    ${fld(p,'assessment','B – Background (PMHx, meds, social)',1)}
    ${fld(p,'recommendation','A – Assessment (exam, obs, results)',1)}
    ${fld(p,'plan','R – Recommendation (plan)',1)}
  </div>
  <div class="surface-box">
    <div style="font-size:10px;font-weight:800;color:var(--amber);letter-spacing:0.1em;margin-bottom:10px;text-transform:uppercase">Safety Checks</div>
    <div class="grid-2">
      ${safetyCheck(p,'vte','VTE prophylaxis')}
      ${safetyCheck(p,'idc','IDC / lines reviewed')}
      ${safetyCheck(p,'falls','Falls risk assessed')}
    </div>
    <div class="grid-2" style="margin-top:10px">
      <div><label class="lbl">IV Access</label><input value="${esc(p.ivAccess)}" onchange="upField('${p.id}','ivAccess',this.value)" placeholder="20G L hand"></div>
      <div><label class="lbl">Diet</label><input value="${esc(p.diet)}" onchange="upField('${p.id}','diet',this.value)" placeholder="NBM / soft"></div>
    </div>
  </div>
  <button class="btn btn-danger" style="width:100%;justify-content:center" onclick="deletePatient('${p.id}')">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg> Remove Patient</button>`;
}

function renderTasks(p) {
  const pending = p.tasks.filter(t=>!t.done);
  const done = p.tasks.filter(t=>t.done);
  let h = `<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
    <button class="btn btn-accent" onclick="addTaskTo('${p.id}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg> New</button>
    <button class="btn btn-default" onclick="openCatPicker('${p.id}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M13 2L3 14h9l-1 10 10-12h-9l1-10z"/></svg> Quick Add</button>
  </div>`;
  if (!pending.length) h += '<div style="text-align:center;padding:30px 0;color:var(--dim);font-size:13px">No pending jobs!</div>';
  pending.forEach(t => h += taskRow(p.id, t));
  if (done.length) {
    h += `<div class="lbl" style="color:var(--green);margin-top:20px;margin-bottom:8px">Completed (${done.length})</div>`;
    done.forEach(t => h += taskRow(p.id, t));
  }
  return h;
}

function taskRow(pid, t) {
  const cat = TASK_CATS.find(c=>c.id===t.category);
  return `<div class="task-row${t.urgent&&!t.done?' urgent':''}">
    <button class="task-check${t.done?' done':''}" onclick="toggleTask('${pid}','${t.id}')">${t.done?'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round"><path d="M20 6L9 17l-5-5"/></svg>':''}</button>
    ${cat?`<span style="font-size:13px;flex-shrink:0" title="${cat.label}">${cat.icon}</span>`:''}
    <input class="task-input${t.done?' done-text':''}" value="${esc(t.text)}" onchange="upTaskText('${pid}','${t.id}',this.value)" placeholder="Describe job…">
    ${!t.done?`<button onclick="toggleUrgent('${pid}','${t.id}')" style="font-size:12px;padding:2px">${t.urgent?'🔴':'⚪'}</button>`:''}
    <button onclick="deleteTask('${pid}','${t.id}')" style="color:var(--dim);padding:2px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg></button>
  </div>`;
}

function renderNotes(p) {
  return `<label class="lbl">Free-text ward round notes</label>
    <textarea style="min-height:220px" onchange="upField('${p.id}','notes',this.value)" placeholder="Progress notes, plans…">${esc(p.notes||'')}</textarea>`;
}

// ── ALL TASKS ──
function renderAllTasks() {
  const all = patients.flatMap(p=>p.tasks.filter(t=>!t.done).map(t=>({...t,pname:p.name||'Unnamed',bed:p.bed,pid:p.id})));
  const cats = [{id:'all',label:'All',icon:'📋',color:'var(--accent)'},...TASK_CATS];
  const filtered = taskFilter==='all'?all:all.filter(t=>t.category===taskFilter);
  const urgent = filtered.filter(t=>t.urgent);
  const normal = filtered.filter(t=>!t.urgent);

  let h = `<div class="section"><div style="font-size:15px;font-weight:700;margin:16px 0 10px">Outstanding Jobs</div>
    <div class="pill-scroll" style="margin-bottom:8px">`;
  cats.forEach(c => {
    const active = taskFilter === c.id;
    h += `<button class="pill${active?' active':''}" style="${active?`border-color:${c.color};background:${c.color}18;color:${c.color}`:''}" onclick="setTaskFilter('${c.id}')">${c.icon} ${c.label}</button>`;
  });
  h += '</div>';
  if (!filtered.length) h += `<div style="text-align:center;padding:40px 0;color:var(--dim);font-size:13px">${all.length?'No jobs in this category':'All done — go get a coffee ☕'}</div>`;
  if (urgent.length) {
    h += `<div class="lbl" style="color:var(--urgent);margin-bottom:8px">🔴 Urgent (${urgent.length})</div>`;
    urgent.forEach(t => h += allTaskRow(t));
  }
  if (normal.length) {
    h += `<div class="lbl" style="color:var(--accent);margin-top:${urgent.length?16:0}px;margin-bottom:8px">Jobs (${normal.length})</div>`;
    normal.forEach(t => h += allTaskRow(t));
  }
  return h + '</div>';
}

function allTaskRow(t) {
  const cat = TASK_CATS.find(c=>c.id===t.category);
  return `<div style="padding:10px 12px;border-radius:8px;margin-bottom:5px;cursor:pointer;background:${t.urgent?'var(--urgentD)':'var(--card)'};border:1px solid ${t.urgent?'rgba(240,101,101,0.2)':'var(--border)'};display:flex;align-items:center;gap:10px" onclick="openPatient('${t.pid}');setSubTab('tasks')">
    <div style="font-size:11px;font-weight:800;color:${t.urgent?'var(--urgent)':'var(--accent)'};width:36px;flex-shrink:0">${esc(t.bed||'?')}</div>
    ${cat?`<span style="font-size:13px;flex-shrink:0">${cat.icon}</span>`:''}
    <div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.text||'No description')}</div>
    <div style="font-size:11px;color:var(--dim)">${esc(t.pname)}</div></div></div>`;
}

// ── SCORES ──
function renderScores() {
  let h = `<div class="section"><div style="font-size:15px;font-weight:700;margin:16px 0 12px">Clinical Calculators</div><div class="score-grid">`;
  SCORES.forEach(s => {
    h += `<div class="score-card" onclick="openScore('${s.id}')"><div style="font-weight:700;font-size:15px;margin-bottom:2px">${s.name}</div><div style="font-size:12px;color:var(--dim)">${s.sub}</div></div>`;
  });
  return h + '</div></div>';
}

// ── REFERENCE ──
function renderReference() {
  let h = `<div class="section"><div style="font-size:15px;font-weight:700;margin:16px 0 12px">Quick Reference</div>
    <div style="display:flex;gap:6px;margin-bottom:12px">
      <button class="pill${refTab==='bloods'?' active':''}" onclick="setRefTab('bloods')">Normal Ranges</button>
      <button class="pill${refTab==='fluids'?' active':''}" onclick="setRefTab('fluids')">IV Fluids</button>
    </div>`;
  if (refTab === 'bloods') {
    h += '<div style="background:var(--card);border-radius:10px;overflow:hidden;border:1px solid var(--border)">';
    NORMALS.forEach(([l,r]) => h += `<div class="ref-row"><span style="font-weight:700;color:var(--accent);min-width:90px">${l}</span><span style="color:var(--dim);text-align:right">${r}</span></div>`);
    h += '</div>';
  } else {
    FLUIDS.forEach(f => h += `<div class="fluid-card"><div style="font-weight:700;font-size:14px;margin-bottom:4px;color:var(--accent)">${f.n}</div><div style="font-size:12px;color:var(--dim);margin-bottom:2px">${f.d}</div><div style="font-size:12px">${f.u}</div></div>`);
  }
  return h + '</div>';
}

// ── HELPERS ──
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fld(p, key, label, area) {
  return `<div class="field"><label class="lbl">${label}</label>${area
    ?`<textarea onchange="upField('${p.id}','${key}',this.value)" placeholder="Enter ${label.toLowerCase()}…">${esc(p[key]||'')}</textarea>`
    :`<input value="${esc(p[key]||'')}" onchange="upField('${p.id}','${key}',this.value)" placeholder="Enter ${label.toLowerCase()}…">`}</div>`;
}
function safetyCheck(p, key, label) {
  return `<label class="safety-check${p[key]?' checked':''}"><input type="checkbox" ${p[key]?'checked':''} onchange="toggleSafety('${p.id}','${key}')">${label}</label>`;
}

// ── ACTIONS ──
function addPatient() { const n = newPatient(); patients.push(n); openPatient(n.id); }
function deletePatient(id) { if(!confirm('Delete this patient?'))return; patients=patients.filter(p=>p.id!==id); if(activeId===id){activeId=null;go('list');} else render(); }
function navPat(dir) { const idx=patients.findIndex(p=>p.id===activeId); const ni=idx+dir; if(ni>=0&&ni<patients.length){activeId=patients[ni].id;render();} }
function setSubTab(t) { subTab=t; render(); }
function setTaskFilter(f) { taskFilter=f; render(); }
function setRefTab(t) { refTab=t; render(); }

function upField(id, key, val) { const p=patients.find(x=>x.id===id); if(p){p[key]=val;saveData();} }
function toggleSafety(id, key) { const p=patients.find(x=>x.id===id); if(p){p[key]=!p[key];render();} }

function addTaskTo(pid, text='', urgent=false, cat='admin') {
  const p=patients.find(x=>x.id===pid);
  if(p){p.tasks.push({id:uid(),text,urgent,done:false,time:timeStr(),category:cat});render();}
}
function toggleTask(pid,tid) { const p=patients.find(x=>x.id===pid);if(p){const t=p.tasks.find(x=>x.id===tid);if(t){t.done=!t.done;render();}} }
function deleteTask(pid,tid) { const p=patients.find(x=>x.id===pid);if(p){p.tasks=p.tasks.filter(t=>t.id!==tid);render();} }
function upTaskText(pid,tid,val) { const p=patients.find(x=>x.id===pid);if(p){const t=p.tasks.find(x=>x.id===tid);if(t){t.text=val;saveData();}} }
function toggleUrgent(pid,tid) { const p=patients.find(x=>x.id===pid);if(p){const t=p.tasks.find(x=>x.id===tid);if(t){t.urgent=!t.urgent;render();}} }

// ── SCORE MODAL ──
function openScore(id) {
  scoreState = {};
  const sc = SCORES.find(s=>s.id===id);
  renderScoreModal(sc);
  document.getElementById('scoreModal').classList.remove('hidden');
}
function closeScore() { document.getElementById('scoreModal').classList.add('hidden'); }

function renderScoreModal(sc) {
  const total = sc.fields.reduce((s,f)=>s+(scoreState[f.k]??0),0);
  const allDone = sc.fields.every(f=>scoreState[f.k]!==undefined);
  const res = sc.interp(total);

  let h = `<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
    <div><div style="font-size:18px;font-weight:800;margin-bottom:2px">${sc.name}</div><div style="font-size:12px;color:var(--dim)">${sc.desc}</div></div>
    <button onclick="closeScore()" style="color:var(--dim);padding:4px"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>`;

  sc.fields.forEach(f => {
    h += `<div style="margin-bottom:14px"><div style="font-size:13px;font-weight:600;margin-bottom:6px">${f.l}</div><div class="flex-wrap">`;
    f.o.forEach(o => {
      const sel = scoreState[f.k]===o.v && scoreState[f.k+'_l']===o.l;
      h += `<button class="score-opt${sel?' sel':''}" onclick="pickScore('${sc.id}','${f.k}',${o.v},'${esc(o.l)}')">${o.l}${o.v!==0?` <span style="opacity:0.5">(${o.v>0?'+':''}${o.v})</span>`:''}</button>`;
    });
    h += '</div></div>';
  });

  h += `<div style="background:${allDone?res.c+'14':'var(--card)'};border:1.5px solid ${allDone?res.c+'44':'var(--border)'};border-radius:10px;padding:14px 16px;margin-top:8px">
    <div style="font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--dim);margin-bottom:4px">Result</div>
    <div style="font-size:16px;font-weight:800;color:${allDone?res.c:'var(--faint)'}">${allDone?res.t:'Answer all fields to see result'}</div>
  </div>
  <button class="btn btn-default" style="width:100%;justify-content:center;margin-top:12px" onclick="resetScore('${sc.id}')">Reset</button>`;

  document.getElementById('scoreContent').innerHTML = h;
}

function pickScore(sid, key, val, label) {
  scoreState[key] = val; scoreState[key+'_l'] = label;
  renderScoreModal(SCORES.find(s=>s.id===sid));
}
function resetScore(sid) { scoreState={}; renderScoreModal(SCORES.find(s=>s.id===sid)); }

// ── CAT PICKER MODAL ──
function openCatPicker(pid) {
  catPickerId = pid;
  let h = `<div style="display:flex;justify-content:space-between;margin-bottom:16px">
    <div style="font-size:17px;font-weight:800">Quick Add Job</div>
    <button onclick="closeCat()" style="color:var(--dim)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>`;
  TASK_CATS.forEach(cat => {
    h += `<div style="margin-bottom:16px"><div style="font-size:11px;font-weight:700;color:${cat.color};letter-spacing:0.06em;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px"><span>${cat.icon}</span> ${cat.label}</div><div class="flex-wrap">`;
    cat.items.forEach(item => {
      h += `<button class="qa-item" onclick="quickAdd('${cat.id}','${esc(item)}')">${item}</button>`;
    });
    h += '</div></div>';
  });
  document.getElementById('catContent').innerHTML = h;
  document.getElementById('catModal').classList.remove('hidden');
}
function closeCat() { document.getElementById('catModal').classList.add('hidden'); }
function quickAdd(catId, text) {
  addTaskTo(catPickerId, text, false, catId);
  closeCat();
}

// ── INIT ──
loadData();
document.getElementById('headerDate').textContent = new Date().toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'});
render();
window.addEventListener('resize', render);
</script>
